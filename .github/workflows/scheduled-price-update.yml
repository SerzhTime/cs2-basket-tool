name: Scheduled Price Update

on:
  workflow_dispatch:
  schedule:
    - cron: "23 */3 * * *"

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      C5GAME_APP_KEY: ${{ secrets.C5GAME_APP_KEY }}
      CSFLOAT_API_KEY: ${{ secrets.CSFLOAT_API_KEY }}
      DMARKET_PUBLIC_KEY: ${{ secrets.DMARKET_PUBLIC_KEY }}
      DMARKET_SECRET_KEY: ${{ secrets.DMARKET_SECRET_KEY }}
      EXCHANGERATE_USD_LATEST_URL: ${{ secrets.EXCHANGERATE_USD_LATEST_URL }}
      HALOSKINS_API_KEY: ${{ secrets.HALOSKINS_API_KEY }}
      HALOSKINS_LOWEST_PRICE_URL: ${{ secrets.HALOSKINS_LOWEST_PRICE_URL }}
      MARKETCSGO_API_KEY: ${{ secrets.MARKETCSGO_API_KEY }}
      SKINPORT_CLIENT_ID: ${{ secrets.SKINPORT_CLIENT_ID }}
      SKINPORT_CLIENT_SECRET: ${{ secrets.SKINPORT_CLIENT_SECRET }}
      SKINDECK_API_KEY: ${{ secrets.SKINDECK_API_KEY }}
      UUSKINS_APP_KEY: ${{ secrets.UUSKINS_APP_KEY }}
      UUSKINS_PRIVATE_KEY: ${{ secrets.UUSKINS_PRIVATE_KEY }}
      WAXPEER_API_KEY: ${{ secrets.WAXPEER_API_KEY }}
      CSGOSKINS_FETCH_MODE: reader
      CSGOSKINS_READER_URL_TEMPLATE: https://r.jina.ai/http://{url}
      CSGOSKINS_DELAY_SECONDS: "4.0"
      CSGOSKINS_DELAY_JITTER_SECONDS: "4.0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run scheduled price update
        run: python scripts/scheduled_update.py

name: Cloud IP Probe

on:
  workflow_dispatch:
    inputs:
      items:
        description: Number of basket items to test
        required: false
        default: "3"
  # Enable this only after manual probe results look reasonable.
  # schedule:
  #   - cron: "17 */6 * * *"

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      C5GAME_APP_KEY: ${{ secrets.C5GAME_APP_KEY }}
      CSFLOAT_API_KEY: ${{ secrets.CSFLOAT_API_KEY }}
      DMARKET_PUBLIC_KEY: ${{ secrets.DMARKET_PUBLIC_KEY }}
      DMARKET_SECRET_KEY: ${{ secrets.DMARKET_SECRET_KEY }}
      EXCHANGERATE_USD_LATEST_URL: ${{ secrets.EXCHANGERATE_USD_LATEST_URL }}
      HALOSKINS_API_KEY: ${{ secrets.HALOSKINS_API_KEY }}
      HALOSKINS_LOWEST_PRICE_URL: ${{ secrets.HALOSKINS_LOWEST_PRICE_URL }}
      MARKETCSGO_API_KEY: ${{ secrets.MARKETCSGO_API_KEY }}
      UUSKINS_APP_KEY: ${{ secrets.UUSKINS_APP_KEY }}
      UUSKINS_PRIVATE_KEY: ${{ secrets.UUSKINS_PRIVATE_KEY }}
      WAXPEER_API_KEY: ${{ secrets.WAXPEER_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run cloud IP probe
        run: >
          python scripts/cloud_probe.py
          --items "${{ github.event.inputs.items || '3' }}"
          --json reports/cloud-probe-report.json
          --markdown reports/cloud-probe-report.md

      - name: Upload probe report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cloud-probe-report
          path: reports/
